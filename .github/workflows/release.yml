name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: dtolnay/rust-toolchain@stable

      - name: Lint & Test
        working-directory: tools/ba2-packer
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Build BA2 packer
        working-directory: tools/ba2-packer
        run: cargo build --release

      - name: Build ESM (Spriggit or create-esm fallback)
        run: |
          dotnet tool install -g Spriggit.CLI
          mkdir -p dist
          if [ -d "src/plugin/StarfieldRussian" ] && [ "$(ls -A src/plugin/StarfieldRussian)" != ".gitkeep" ]; then
            spriggit deserialize \
              --InputPath src/plugin/StarfieldRussian \
              --OutputPath dist/StarfieldRussian.esm \
              --GameRelease Starfield
          else
            echo "No Spriggit plugin source found, using create-esm fallback"
            ./tools/ba2-packer/target/release/ba2-packer create-esm \
              --output dist/StarfieldRussian.esm
          fi

      - name: Pack BA2 archives
        run: |
          if ls src/strings/*.STRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.DLSTRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.ILSTRINGS 1>/dev/null 2>&1 || \
             [ -f src/interface/fonts_en.swf ]; then
            ./tools/ba2-packer/target/release/ba2-packer pack \
              --input-strings src/strings \
              --input-interface src/interface \
              --output-dir dist
          else
            echo "No string table or interface files found, skipping BA2 packing"
          fi

      - name: Validate (if artifacts exist)
        run: |
          if [ -f "dist/StarfieldRussian.esm" ] || [ -f "dist/StarfieldRussian - Main.ba2" ] || [ -f "dist/StarfieldRussian - Interface.ba2" ]; then
            ./tools/ba2-packer/target/release/ba2-packer validate dist \
              --source-strings src/strings \
              --source-interface src/interface \
              --require-credits
          else
            echo "No artifacts to validate"
          fi

      - name: Package
        run: |
          cd dist
          zip -r ../StarfieldRussian-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: StarfieldRussian-${{ github.ref_name }}.zip
          generate_release_notes: true
