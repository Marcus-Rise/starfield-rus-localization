name: Build Mod
on: [push, pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: tools/ba2-packer
        run: cargo fmt --check

      - name: Clippy
        working-directory: tools/ba2-packer
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: tools/ba2-packer
        run: cargo test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build BA2 packer
        working-directory: tools/ba2-packer
        run: cargo build --release

      - name: Build ESM (Spriggit)
        run: |
          dotnet tool install -g Spriggit.CLI
          if [ -d "src/plugin/StarfieldRussian" ] && [ "$(ls -A src/plugin/StarfieldRussian)" != ".gitkeep" ]; then
            spriggit deserialize \
              --InputPath src/plugin/StarfieldRussian \
              --OutputPath dist/StarfieldRussian.esm \
              --GameRelease Starfield
          else
            echo "No plugin source files found, skipping ESM build"
            mkdir -p dist
          fi

      - name: Pack BA2 archives
        run: |
          if ls src/strings/*.STRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.DLSTRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.ILSTRINGS 1>/dev/null 2>&1 || \
             ls src/interface/fonts_en.swf 1>/dev/null 2>&1 || \
             ls src/interface/fontconfig_en.txt 1>/dev/null 2>&1 || \
             ls src/interface/translate_en.txt 1>/dev/null 2>&1; then
            ./tools/ba2-packer/target/release/ba2-packer pack \
              --input-strings src/strings \
              --input-interface src/interface \
              --output-dir dist
          else
            echo "No string table or interface files found, skipping BA2 packing"
          fi

      - name: Validate (if artifacts exist)
        run: |
          if [ -f "dist/StarfieldRussian.esm" ] || [ -f "dist/StarfieldRussian - Main.ba2" ]; then
            ./tools/ba2-packer/target/release/ba2-packer validate dist \
              --source-strings src/strings \
              --source-interface src/interface
          else
            echo "No artifacts to validate"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: starfield-russian-mod
          path: dist/
          if-no-files-found: warn
