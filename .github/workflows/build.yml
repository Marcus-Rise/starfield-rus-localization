name: Build Mod
on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build BA2 packer
        working-directory: tools/ba2-packer
        run: cargo build --release

      - name: Build ESM (Spriggit)
        run: |
          dotnet tool install -g Spriggit.CLI
          if [ -d "src/plugin/StarfieldRussian" ] && [ "$(ls -A src/plugin/StarfieldRussian)" != ".gitkeep" ]; then
            spriggit deserialize \
              --InputPath src/plugin/StarfieldRussian \
              --OutputPath dist/StarfieldRussian.esm \
              --GameRelease Starfield
          else
            echo "No Spriggit plugin source found, using create-esm fallback"
            mkdir -p dist
            ./tools/ba2-packer/target/release/ba2-packer create-esm \
              --output dist/StarfieldRussian.esm
          fi

      - name: Pack BA2 archives
        env:
          TRANSLATION_CREDIT: ${{ vars.TRANSLATION_CREDIT }}
        run: |
          if ls src/strings/*.STRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.DLSTRINGS 1>/dev/null 2>&1 || \
             ls src/strings/*.ILSTRINGS 1>/dev/null 2>&1 || \
             [ -f src/interface/fonts_en.swf ]; then
            PACK_ARGS=(--input-strings src/strings --input-interface src/interface --output-dir dist)
            if [ -n "$TRANSLATION_CREDIT" ]; then
              PACK_ARGS+=(--credit "$TRANSLATION_CREDIT")
            fi
            ./tools/ba2-packer/target/release/ba2-packer pack "${PACK_ARGS[@]}"
          else
            echo "No string table or interface files found, skipping BA2 packing"
          fi

      - name: Validate
        env:
          TRANSLATION_CREDIT: ${{ vars.TRANSLATION_CREDIT }}
        run: |
          if [ -f "dist/StarfieldRussian - Main.ba2" ] || [ -f "dist/StarfieldRussian - Interface.ba2" ]; then
            VALIDATE_ARGS=(dist --source-strings src/strings --source-interface src/interface)
            if [ -n "$TRANSLATION_CREDIT" ]; then
              VALIDATE_ARGS+=(--require-credits)
            fi
            ./tools/ba2-packer/target/release/ba2-packer validate "${VALIDATE_ARGS[@]}"
          else
            echo "No BA2 archives found, skipping full validation (tooling-only mode)"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: starfield-russian-mod
          path: dist/
          if-no-files-found: warn
