name: PR Validation
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: tools/ba2-packer
        run: cargo fmt --check

      - name: Clippy
        working-directory: tools/ba2-packer
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: tools/ba2-packer
        run: cargo test

  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        working-directory: tools/ba2-packer
        run: cargo build --release

      - name: Verify subcommands documented
        run: |
          CLI=./tools/ba2-packer/target/release/ba2-packer
          HELP=$($CLI --help 2>&1)
          CMDS=$(echo "$HELP" | sed -n '/Commands:/,/Options:/p' | grep -E '^\s+\w' | awk '{print $1}' | grep -v '^help$')

          if [ -z "$CMDS" ]; then
            echo "ERROR: no subcommands extracted from '$CLI --help'"
            exit 1
          fi
          echo "Subcommands: $CMDS"
          FAIL=0

          # 1) README.md — all subcommands
          echo "--- README.md ---"
          ERR=0
          for cmd in $CMDS; do
            if ! grep -qw "$cmd" README.md; then
              echo "  MISSING: $cmd"; ERR=1
            fi
          done
          [ $ERR -eq 0 ] && echo "  OK"
          FAIL=$((FAIL | ERR))

          # 2) docs/WORKFLOW.md — all subcommands
          echo "--- docs/WORKFLOW.md ---"
          ERR=0
          for cmd in $CMDS; do
            if ! grep -qw "$cmd" docs/WORKFLOW.md; then
              echo "  MISSING: $cmd"; ERR=1
            fi
          done
          [ $ERR -eq 0 ] && echo "  OK"
          FAIL=$((FAIL | ERR))

          # 3) .claude/agents/*.md — each subcommand in at least one agent
          echo "--- .claude/agents/ ---"
          ERR=0
          for cmd in $CMDS; do
            if ! grep -qw "$cmd" .claude/agents/*.md 2>/dev/null; then
              echo "  MISSING: $cmd (not in any agent file)"; ERR=1
            fi
          done
          [ $ERR -eq 0 ] && echo "  OK"
          FAIL=$((FAIL | ERR))

          if [ $FAIL -ne 0 ]; then
            echo "FAILED: update the files above, see CLAUDE.md Rule 7"
            exit 1
          fi
          echo "All documentation in sync."

  check-sources:
    name: Check Source Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check fontconfig_en.txt
        run: |
          if [ -f "src/interface/fontconfig_en.txt" ]; then
            if grep -q 'fontlib "fonts_en"' src/interface/fontconfig_en.txt; then
              echo "fontconfig_en.txt: fontlib reference OK"
            else
              echo "ERROR: fontconfig_en.txt missing fontlib \"fonts_en\""
              exit 1
            fi
          fi

      - name: Check translate_en.txt encoding
        run: |
          if [ -f "src/interface/translate_en.txt" ]; then
            ENCODING=$(file -b src/interface/translate_en.txt)
            if echo "$ENCODING" | grep -qi "UTF-16"; then
              echo "translate_en.txt: encoding OK ($ENCODING)"
            else
              echo "ERROR: translate_en.txt should be UTF-16LE, got: $ENCODING"
              exit 1
            fi
          fi

      - name: Check directory structure
        run: |
          MISSING=0
          for dir in src/strings src/interface src/plugin/StarfieldRussian tools/ba2-packer .github/workflows; do
            if [ ! -d "$dir" ]; then
              echo "MISSING: $dir"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: $MISSING required directories missing"
            exit 1
          fi
          echo "Directory structure OK"
